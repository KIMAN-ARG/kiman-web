<!DOCTYPE html>
<html>

<head>

<title>KIMAN</title>
<link rel="stylesheet" href="style.css">
</head>
<script>

const searchBtn = document.getElementById("search-btn")
const searchBox = document.getElementById("search-box")

searchBtn.onclick = () => {

if(searchBox.style.width === "220px"){
searchBox.style.width = "0"
}else{
searchBox.style.width = "220px"
}

}


const menuBtn = document.getElementById("menu-btn")
const sideMenu = document.getElementById("side-menu")

menuBtn.onclick = () => {

if(sideMenu.style.left === "0px"){
sideMenu.style.left = "-250px"
}else{
sideMenu.style.left = "0px"
}

}

</script>
<body>
<header class="topbar">

<img src="barra 1 kiman.png" class="topbar-bg">

<div class="topbar-content">

<img src="catalogo.png" class="icon" id="menu-btn">

<a href="index.html">
<img src="logo 1.png" class="logo">
</a>

<div class="right-icons">

<img src="lupa.png" class="icon" id="search-btn">

<a href="carrito de compras.html">
<img src="carrito de compras.png" class="icon">
</a>

</div>

</div>

<div class="search-box" id="search-box">
<input type="text" placeholder="buscar...">
</div>

</header>


<div class="side-menu" id="side-menu">
<p>Menu</p>
<p>Colecciones</p>
<p>Accesorios</p>
<p>Contacto</p>
</div>


<section class="hero">
</section>
</body>

</html>
